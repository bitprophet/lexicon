version: 2.1

# TODO: so are any top level names circle does not use, just ignored?
params:
  deps: &deps
    dependency-file: dev-requirements.txt

orbs:
  python: circleci/python@0.3.2

jobs:
  build-and-test:
    executor: python/default
    steps:
      - checkout
      - python/load-cache:
          <<: *deps
      - python/install-deps:
          <<: *deps
      - python/save-cache:
          <<: *deps
      - run:
          command: inv test
          name: Test

workflows:
  main:
    jobs:
      - build-and-test
